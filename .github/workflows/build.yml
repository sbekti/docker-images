name: Docker
run-name: >-
  ${{
    github.event_name == 'workflow_dispatch' && format('Build {0} ({1}, manual)', inputs.image, github.ref_name) ||
    startsWith(github.ref, 'refs/tags/') && format('Build {0}', github.ref_name) ||
    format('Build changed images ({0})', github.ref_name)
  }}

on:
  push:
    branches: [main]
    tags: ['*/v*.*.*']
  pull_request:
    paths:
      - 'images/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      image:
        description: 'Image to build (directory name under images/)'
        required: true
        type: choice
        options:
          - asterisk
          - aws-cli-tgz
          - freeradius
          - samba-ad

env:
  REGISTRY: ghcr.io

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------
  # Determine which images need to be built
  # ---------------------------------------------------------
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_images: ${{ steps.set-matrix.outputs.has_images }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine images to build
        id: set-matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          SELECTED_IMAGE: ${{ inputs.image }}
        run: |
          set -euo pipefail

          IMAGES=()

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            IMAGES+=("$SELECTED_IMAGE")
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            IMAGE_NAME="${TAG%%/*}"
            IMAGES+=("$IMAGE_NAME")
          else
            if [[ "$EVENT_NAME" == "pull_request" ]]; then
              BASE_SHA="$PR_BASE_SHA"
            else
              BASE_SHA="$PUSH_BEFORE_SHA"
            fi

            if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]]; then
              echo "Cannot determine a valid base commit for $EVENT_NAME." >&2
              exit 1
            fi

            mapfile -t CHANGED_FILES < <(git diff --name-only "$BASE_SHA" "$GITHUB_SHA")

            BUILD_ALL=false
            for file in "${CHANGED_FILES[@]}"; do
              if [[ "$file" == ".github/workflows/build.yml" ]]; then
                BUILD_ALL=true
                break
              fi
            done

            for dir in images/*/; do
              IMAGE_NAME=$(basename "$dir")
              if [[ "$BUILD_ALL" == "true" ]]; then
                IMAGES+=("$IMAGE_NAME")
                continue
              fi

              for file in "${CHANGED_FILES[@]}"; do
                if [[ "$file" == "images/${IMAGE_NAME}/"* ]]; then
                  IMAGES+=("$IMAGE_NAME")
                  break
                fi
              done
            done
          fi

          for image in "${IMAGES[@]}"; do
            if [[ ! -f "images/${image}/Dockerfile" ]]; then
              echo "Unknown image: ${image}" >&2
              exit 1
            fi
          done

          if [ ${#IMAGES[@]} -eq 0 ]; then
            echo "matrix={\"image\":[]}" >> "$GITHUB_OUTPUT"
            echo "has_images=false" >> "$GITHUB_OUTPUT"
          else
            JSON=$(printf '%s\n' "${IMAGES[@]}" | jq -R . | jq -sc '{"image": .}')
            echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
            echo "has_images=true" >> "$GITHUB_OUTPUT"
          fi

          echo "Images to build: ${IMAGES[*]:-none}"

  # ---------------------------------------------------------
  # Build images on pull requests without publishing
  # ---------------------------------------------------------
  build:
    needs: detect
    if: github.event_name == 'pull_request' && needs.detect.outputs.has_images == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: images/${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  # ---------------------------------------------------------
  # Build and publish images on main, tags, and manual runs
  # ---------------------------------------------------------
  publish:
    needs: detect
    if: github.event_name != 'pull_request' && needs.detect.outputs.has_images == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/sbekti/${{ matrix.image }}
          tags: |
            # On tag push: extract version from prefixed tag (asterisk/v1.0.0 -> v1.0.0)
            type=match,pattern=.+/(v.+),group=1,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            # Also tag as latest on version tags
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            # On push to main
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: images/${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      - name: Sign the published Docker image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

  # ---------------------------------------------------------
  # One stable result for branch protection and Renovate
  # ---------------------------------------------------------
  gate:
    name: Image build gate
    if: always()
    needs:
      - detect
      - build
      - publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify required jobs
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DETECT_RESULT: ${{ needs.detect.result }}
          EVENT_NAME: ${{ github.event_name }}
          HAS_IMAGES: ${{ needs.detect.outputs.has_images }}
          PUBLISH_RESULT: ${{ needs.publish.result }}
        run: |
          if [[ "$DETECT_RESULT" != "success" ]]; then
            echo "Image detection failed." >&2
            exit 1
          fi

          if [[ "$HAS_IMAGES" != "true" ]]; then
            echo "No images require a build."
            exit 0
          fi

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            REQUIRED_RESULT="$BUILD_RESULT"
          else
            REQUIRED_RESULT="$PUBLISH_RESULT"
          fi

          if [[ "$REQUIRED_RESULT" != "success" ]]; then
            echo "Required image jobs finished with: $REQUIRED_RESULT" >&2
            exit 1
          fi
